<div class="min-h-[80vh] grid md:grid-cols-2">
  <div class="hidden md:block relative">
    <img src="https://picsum.photos/seed/login-hero/1000/1200" class="absolute inset-0 w-full h-full object-cover" alt="Interior de una casa" />
    <div class="absolute inset-0 bg-brand-950/40"></div>
    <div class="absolute bottom-10 left-10 text-white max-w-sm">
      <h2 class="font-display text-3xl font-semibold mb-2">Encuentra tu próximo hogar</h2>
      <p class="text-sand-100/90">Cotiza, compra o renta con acompañamiento de principio a fin.</p>
    </div>
  </div>

  <div class="flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-sm">
      <h1 class="font-display text-2xl font-semibold text-brand-950 mb-1">Iniciar sesión</h1>
      <p class="text-sm text-brand-600 mb-6">Accede a tu cuenta de CasaFácil</p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div>
          <label class="text-sm font-medium text-brand-800">Correo electrónico</label>
          <input type="email" formControlName="email" class="input mt-1" placeholder="tucorreo@ejemplo.com" />
        </div>
        <div>
          <label class="text-sm font-medium text-brand-800">Contraseña</label>
          <input type="password" formControlName="password" class="input mt-1" placeholder="••••••••" />
        </div>

        @if (error) {
          <p class="text-sm text-red-600">{{ error }}</p>
        }

        <button type="submit" class="btn-primary w-full" [disabled]="cargando">
          {{ cargando ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>

      <div class="mt-6 border-t border-sand-100 pt-4">
        <p class="text-xs text-brand-500 mb-2">Cuentas de demostración:</p>
        <div class="flex flex-wrap gap-2">
          @for (cuenta of cuentasDemo; track cuenta.email) {
            <button type="button" class="badge bg-sand-100 text-brand-700 hover:bg-sand-200" (click)="usarCuentaDemo(cuenta.email, cuenta.password)">
              {{ cuenta.rol }}
            </button>
          }
        </div>
      </div>

      <p class="text-sm text-brand-600 mt-6">
        ¿No tienes cuenta?
        <a routerLink="/registro" class="text-brand-700 font-semibold hover:underline">Regístrate aquí</a>
      </p>
    </div>
  </div>
</div>
