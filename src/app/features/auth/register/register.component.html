<div class="min-h-[80vh] flex items-center justify-center px-6 py-16">
  <div class="w-full max-w-sm">
    <h1 class="font-display text-2xl font-semibold text-brand-950 mb-1">Crea tu cuenta</h1>
    <p class="text-sm text-brand-600 mb-6">Regístrate para cotizar, comprar o rentar propiedades</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="text-sm font-medium text-brand-800">Nombre completo</label>
        <input type="text" formControlName="nombre" class="input mt-1" placeholder="Tu nombre" />
      </div>
      <div>
        <label class="text-sm font-medium text-brand-800">Correo electrónico</label>
        <input type="email" formControlName="email" class="input mt-1" placeholder="tucorreo@ejemplo.com" />
      </div>
      <div>
        <label class="text-sm font-medium text-brand-800">Teléfono (10 dígitos)</label>
        <input type="tel" formControlName="telefono" class="input mt-1" placeholder="2281234567" />
      </div>
      <div>
        <label class="text-sm font-medium text-brand-800">Contraseña</label>
        <input type="password" formControlName="password" class="input mt-1" placeholder="Mínimo 6 caracteres" />
      </div>

      @if (error) {
        <p class="text-sm text-red-600">{{ error }}</p>
      }

      <button type="submit" class="btn-primary w-full" [disabled]="cargando">
        {{ cargando ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="text-sm text-brand-600 mt-6">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-brand-700 font-semibold hover:underline">Inicia sesión</a>
    </p>
  </div>
</div>
